# Наша конфигурация для GitHub Actions
name: C++ CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  IMAGE_NAME: cpp-calculator

jobs:
  # JOB 1: Сборка и тестирование (CI)
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Качаем код в виртуалку
    
    - name: Build Docker image for testing
      run: |
        docker build --target tester -t ${{ env.IMAGE_NAME }}:test .
    
    - name: Run tests
      run: |
        docker run --rm ${{ env.IMAGE_NAME }}:test
  
  # JOB 2: Публикация артефакта
  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push production image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: runtime
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest